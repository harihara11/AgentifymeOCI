name: Deploy GitHub Pages

on:
  push:
    branches:
      - 17june
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp AgentifyME_OCI_AI_Prototype_v3.html _site/index.html
          cp AgentifyME_OCI_AI_Prototype_v3.html _site/AgentifyME_OCI_AI_Prototype_v3.html
          cp -R data src KnowledgeSources _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
